<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENOR | Barbearia - Agendamento Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-pattern"></div>
    
    <div class="container">
        <header>
            <div class="logo-container">
                <div class="logo-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 7C4 5.89543 4.89543 5 6 5H18C19.1046 5 20 5.89543 20 7V19C20 20.1046 19.1046 21 18 21H6C4.89543 21 4 20.1046 4 19V7Z" stroke="#D4AF37" stroke-width="1.5"/>
                        <path d="M8 5V3M16 5V3" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M12 13L12 9M12 17L12 13" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round"/>
                        <circle cx="12" cy="13" r="1" fill="#D4AF37"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>SEN<span>OR</span></h1>
                    <p>BARBA · CABELO · BIGODE</p>
                    <div class="tagline">OUT OF HAND</div>
                </div>
            </div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('agendamento', event)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M3 10H21M8 2V6M16 2V6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                NOVO AGENDAMENTO
            </button>
            <button class="tab-btn" onclick="showTab('historico', event)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 8V12L15 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M12 4V2M20 12H22M4 12H2M12 20V22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                MEU HISTÓRICO
            </button>
        </div>

        <!-- Aba de Agendamento -->
        <div id="agendamento" class="tab-content active">
            <form id="agendamentoForm">
                <div class="form-group">
                    <label>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M20 7H4C2.9 7 2 7.9 2 9V19C2 20.1 2.9 21 4 21H20C21.1 21 22 20.1 22 19V9C22 7.9 21.1 7 20 7Z" stroke="#D4AF37" stroke-width="1.5"/>
                            <path d="M16 21V5C16 3.9 15.1 3 14 3H10C8.9 3 8 3.9 8 5V21" stroke="#D4AF37" stroke-width="1.5"/>
                        </svg>
                        SERVIÇO
                    </label>
                    <select id="servico" required>
                        <option value="">Carregando serviços...</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M20 21V19C20 16.8 18.2 15 16 15H8C5.8 15 4 16.8 4 19V21" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round"/>
                                <circle cx="12" cy="7" r="4" stroke="#D4AF37" stroke-width="1.5"/>
                            </svg>
                            NOME
                        </label>
                        <input type="text" id="clienteNome" required placeholder="Seu nome completo">
                    </div>
                    <div class="form-group">
                        <label>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M22 16.92V19C22.001 19.7264 21.782 20.4361 21.3769 21.0332C20.9718 21.6303 20.403 22.0832 19.745 22.324C19.087 22.5647 18.3742 22.5809 17.707 22.3705C16.8103 22.082 15.1944 21.3666 13.2804 19.7299C11.3789 18.1039 9.80673 16.0406 8.72034 13.7025C7.98227 12.1382 7.64669 11.1374 7.565 10.7999C7.37242 10.1083 7.38844 9.37348 7.61097 8.69116C7.82977 8.01926 8.28835 7.43744 8.858 7.05001L10.15 6.12001C10.6244 5.78024 11.2229 5.6622 11.7823 5.79469C12.3417 5.92717 12.8114 6.29846 13.085 6.80001L14.178 8.78001C14.4333 9.23116 14.5066 9.76813 14.3824 10.2731C14.2582 10.778 13.9465 11.2089 13.52 11.47L12.35 12.16C13.2551 14.2871 14.8697 16.0158 16.91 17.03L17.68 15.82C17.9479 15.3694 18.3767 15.0339 18.8849 14.8821C19.3931 14.7302 19.9424 14.774 20.42 15.005L22.25 15.845C22.8282 16.124 23.2389 16.6603 23.3671 17.2937C23.4953 17.9271 23.328 18.5838 22.92 19.07L21.67 20.62" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round"/>
                            </svg>
                            WHATSAPP
                        </label>
                        <input type="tel" id="clienteTelefone" required placeholder="(00) 00000-0000">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <rect x="3" y="4" width="18" height="18" rx="2" stroke="#D4AF37" stroke-width="1.5"/>
                                <path d="M3 10H21M8 2V6M16 2V6" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round"/>
                            </svg>
                            DATA
                        </label>
                        <input type="date" id="data" required>
                    </div>
                    <div class="form-group">
                        <label>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="12" cy="12" r="10" stroke="#D4AF37" stroke-width="1.5"/>
                                <path d="M12 6V12L16 14" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round"/>
                            </svg>
                            HORÁRIO
                        </label>
                        <select id="horario" required disabled>
                            <option value="">Selecione primeiro a data</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 12V20H4V12M12 4V16M12 16L8 12M12 16L16 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    CONFIRMAR AGENDAMENTO
                </button>
            </form>
            <div id="mensagem" class="mensagem"></div>
        </div>

        <!-- Aba de Histórico -->
        <div id="historico" class="tab-content">
            <div class="form-group">
                <label>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22 16.92V19C22.001 19.7264 21.782 20.4361 21.3769 21.0332C20.9718 21.6303 20.403 22.0832 19.745 22.324C19.087 22.5647 18.3742 22.5809 17.707 22.3705C16.8103 22.082 15.1944 21.3666 13.2804 19.7299C11.3789 18.1039 9.80673 16.0406 8.72034 13.7025C7.98227 12.1382 7.64669 11.1374 7.565 10.7999C7.37242 10.1083 7.38844 9.37348 7.61097 8.69116C7.82977 8.01926 8.28835 7.43744 8.858 7.05001L10.15 6.12001C10.6244 5.78024 11.2229 5.6622 11.7823 5.79469C12.3417 5.92717 12.8114 6.29846 13.085 6.80001L14.178 8.78001C14.4333 9.23116 14.5066 9.76813 14.3824 10.2731C14.2582 10.778 13.9465 11.2089 13.52 11.47L12.35 12.16C13.2551 14.2871 14.8697 16.0158 16.91 17.03L17.68 15.82C17.9479 15.3694 18.3767 15.0339 18.8849 14.8821C19.3931 14.7302 19.9424 14.774 20.42 15.005L22.25 15.845C22.8282 16.124 23.2389 16.6603 23.3671 17.2937C23.4953 17.9271 23.328 18.5838 22.92 19.07L21.67 20.62" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    CONSULTAR POR TELEFONE
                </label>
                <div class="historico-busca">
                    <input type="tel" id="buscaTelefone" placeholder="(00) 00000-0000">
                    <button onclick="buscarHistorico()" class="btn-secondary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
                            <path d="M16 16L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        BUSCAR
                    </button>
                </div>
            </div>
            <div id="historicoLista" class="historico-lista"></div>
        </div>
    </div>

    <footer>
        <p>SENOR BARBERSHOP · AGENDAMENTO PREMIUM</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
